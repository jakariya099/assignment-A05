<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github-Issue-Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- tailwind+daisy  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- icons  -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <style>
      * {
        font-family: "Outfit", sans-serif;
      }
    </style>
  </head>

<body class="bg-gray-50 min-h-screen">
    <nav class="navbar bg-white border-b px-4 lg:px-20 py-4 shadow-sm">
      <div class="flex-1 gap-2">
        <img class="w-8 h-8" src="assets/github-logo.png" alt="Logo" />
        <a class="text-xl font-bold text-gray-800">GitHub Issues Tracker</a>
      </div>
      <div class="flex-none gap-4">
        <div class="join">
          <input
            id="searchInput"
            type="text"
            placeholder="Search issues..."
            class="input input-bordered join-item w-40 md:w-64"
          />
          <button onclick="handleSearch()" class="btn btn-primary join-item">
            Search
          </button>
        </div>
        <button
          class="btn btn-primary bg-blue-600 border-none text-white "
        >
          + New Issue
        </button>
      </div>
    </nav>

    <main class="container mx-auto px-4 lg:px-20 py-8">
      <div class="flex gap-2 mb-8 bg-gray-100 p-1 rounded-lg w-fit">
        <button
          onclick="filterData('all', this)"
          class="btn btn-sm px-8 tab-btn bg-blue-600 text-white border-none shadow-md"
        >
          All
        </button>
        <button
          onclick="filterData('open', this)"
          class="btn btn-sm px-8 tab-btn bg-transparent border-none text-gray-600 hover:bg-white"
        >
          Open
        </button>
        <button
          onclick="filterData('closed', this)"
          class="btn btn-sm px-8 tab-btn bg-transparent border-none text-gray-600 hover:bg-white"
        >
          Closed
        </button>
      </div>

      <div
        class="bg-white rounded-xl shadow-sm p-6 mb-8 border border-gray-100 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <div class="p-3 bg-blue-100 rounded-full">
            <img src="assets/Aperture.png" alt="Issues" class="w-6 h-6" />
          </div>
          <div>
            <h2 class="text-2xl font-extrabold text-gray-800">
              <span id="issueCount">0</span> Issues
            </h2>
            <p class="text-gray-400 text-sm">
              Track and manage your project issues
            </p>
          </div>
        </div>
        <div class="flex gap-4 text-xs font-bold uppercase tracking-wider">
          <span class="flex items-center gap-2"
            ><span class="w-3 h-3 bg-green-500 rounded-full"></span> Open</span
          >
          <span class="flex items-center gap-2"
            ><span class="w-3 h-3 bg-purple-500 rounded-full"></span>
            Closed</span
          >
        </div>
      </div>

      <div id="loader" class="flex justify-center py-20">
        <span class="loading loading-spinner loading-lg text-primary"></span>
      </div>

      <div
        id="issueContainer"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
      ></div>
    </main>

    <dialog id="issueModal" class="modal">
      <div
        class="modal-box w-11/12 max-w-2xl bg-white p-0 overflow-hidden"
        id="modalContent"
      ></div>
      <form method="dialog" class="modal-backdrop bg-black/50">
        <button>close</button>
      </form>
    </dialog>

    <script src="./script/issue.js"></script>
  </body>
</html>
